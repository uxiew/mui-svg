name: Sync upstream & release

on:
  # 每两天 UTC 18:00 (北京时间次日 02:00) 触发一次
  schedule:
    - cron: "0 18 * * 0"
  # 也支持手动触发, 便于排错与 force release
  workflow_dispatch:
    inputs:
      force:
        description: "强制重新生成并发版 (即使上游无更新)"
        required: false
        default: "false"

permissions:
  contents: write # 用于 push commit / tag
  packages: write # 用于 npm provenance (可选)
  id-token: write # OIDC, npm provenance

concurrency:
  group: sync-upstream
  cancel-in-progress: true

jobs:
  sync:
    name: Detect, generate, build, publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          registry-url: "https://registry.npmjs.org"

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Detect upstream version & decide bump
        id: sync
        run: bun run scripts/sync-upstream.ts

      - name: Skip when nothing to do
        if: steps.sync.outputs.changed != 'true' && github.event.inputs.force != 'true'
        run: |
          echo "上游无更新 (上游=${{ steps.sync.outputs.upstream_version }}, 已记录=${{ steps.sync.outputs.previous_upstream_version }})"
          echo "若需强制重发, 使用 workflow_dispatch 并将 force=true."

      - name: Install dependencies
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: bun install

      - name: Sync MUI synonyms (for playground search parity)
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: bun run scripts/sync-synonyms.ts

      - name: Build (generate icons + tsc compile)
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: bun run build

      - name: Sanity check
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts
          ICON_COUNT=$(ls dist/icons/*.js | wc -l | tr -d ' ')
          echo "图标数量: $ICON_COUNT"
          if [ "$ICON_COUNT" -lt 5000 ]; then
            echo "::error::图标产物数量异常 ($ICON_COUNT < 5000), 构建可能不完整"
            exit 1
          fi

      - name: Commit & tag
        if: steps.sync.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eo pipefail

          NEW_VERSION="${{ steps.sync.outputs.next_version }}"
          UP_VERSION="${{ steps.sync.outputs.upstream_version }}"
          BUMP="${{ steps.sync.outputs.bump_kind }}"

          git add package.json bun.lock playground/synonyms.json

          # 如果没有任何变更则跳过 commit（避免失败）
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(sync): @mui/icons-material -> ${UP_VERSION} (${BUMP} bump to v${NEW_VERSION})"
          fi

          # 强制更新/覆盖 tag（本身 tag 推送通常不会造成非快进问题）
          git tag -f "v${NEW_VERSION}"

          # 识别当前分支（兼容 refs/heads/* 情况）
          if [ -n "${GITHUB_REF}" ]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
          else
            BRANCH=$(git rev-parse --abbrev-ref HEAD)
          fi
          echo "Current branch: ${BRANCH}"

          # 同步远端并 rebase 到远端最新提交，发现冲突时中断以便人工介入
          git fetch origin "${BRANCH}"
          git rebase "origin/${BRANCH}"

          # 推送分支与 tag；使用 --force-with-lease 更安全，避免无意识覆盖远端新提交
          git push origin HEAD --tags --force-with-lease

      - name: Publish to npm
        if: steps.sync.outputs.changed == 'true' || github.event.inputs.force == 'true'
        run: npm publish --access public

      - name: Create GitHub Release
        if: steps.sync.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.sync.outputs.next_version }}
          name: v${{ steps.sync.outputs.next_version }}
          body: |
            自动同步 [`@mui/icons-material@${{ steps.sync.outputs.upstream_version }}`](https://www.npmjs.com/package/@mui/icons-material/v/${{ steps.sync.outputs.upstream_version }})

            - 上游版本: `${{ steps.sync.outputs.previous_upstream_version }}` → `${{ steps.sync.outputs.upstream_version }}`
            - 本包版本: `${{ steps.sync.outputs.bump_kind }}` 凸点 → `v${{ steps.sync.outputs.next_version }}`
          generate_release_notes: false
